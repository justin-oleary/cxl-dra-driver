name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run --timeout=5m ./...

      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -quiet ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run tests with coverage
        run: |
          go test -race -coverprofile=coverage.out -v ./...
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.out | tail -1 >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.out | grep total

  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run fuzz tests
        run: |
          go test -fuzz=FuzzGetAllocationMeta -fuzztime=30s ./pkg/controller/...
          go test -fuzz=FuzzAllocationMetaMarshal -fuzztime=30s ./pkg/controller/...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build binaries
        run: |
          CGO_ENABLED=0 go build -o bin/cxl-controller ./cmd/controller
          CGO_ENABLED=0 go build -o bin/cxl-node-plugin ./cmd/node-plugin
          CGO_ENABLED=0 go build -o bin/cxl-mock-switch ./cxl-mock-switch

      - name: Build container images
        run: |
          docker build -t cxl-dra-controller:test -f Dockerfile.controller .
          docker build -t cxl-node-plugin:test -f Dockerfile.node-plugin .
          docker build -t cxl-mock-switch:test -f Dockerfile.mock-switch .

  e2e:
    name: E2E Test
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build container images
        run: |
          docker build -t cxl-dra-controller:test -f Dockerfile.controller .
          docker build -t cxl-node-plugin:test -f Dockerfile.node-plugin .
          docker build -t cxl-mock-switch:test -f Dockerfile.mock-switch .

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: cxl-test
          config: .github/kind-config.yaml

      - name: Load images into kind
        run: |
          kind load docker-image cxl-dra-controller:test --name cxl-test
          kind load docker-image cxl-node-plugin:test --name cxl-test
          kind load docker-image cxl-mock-switch:test --name cxl-test

      - name: Deploy CXL DRA driver
        run: |
          kubectl create namespace cxl-system || true
          # render manifests, swap images, set imagePullPolicy to Never for kind
          kubectl apply -k deploy/kubernetes --dry-run=client -o yaml | \
            sed 's|ghcr.io/justin-oleary/cxl-dra-controller:latest|cxl-dra-controller:test|g' | \
            sed 's|ghcr.io/justin-oleary/cxl-node-plugin:latest|cxl-node-plugin:test|g' | \
            sed 's|ghcr.io/justin-oleary/cxl-mock-switch:latest|cxl-mock-switch:test|g' | \
            sed 's|imagePullPolicy: Always|imagePullPolicy: Never|g' | \
            kubectl apply -f -

      - name: Wait for controller
        run: |
          kubectl -n cxl-system wait --for=condition=available deployment/cxl-dra-controller --timeout=120s
          kubectl -n cxl-system wait --for=condition=ready pod -l app=cxl-mock-switch --timeout=120s
          kubectl -n cxl-system get pods

      - name: Create ResourceSlice for kind worker
        run: |
          WORKER_NODE=$(kubectl get nodes -l '!node-role.kubernetes.io/control-plane' -o jsonpath='{.items[0].metadata.name}')
          echo "Creating ResourceSlice for node: $WORKER_NODE"
          cat <<EOF | kubectl apply -f -
          apiVersion: resource.k8s.io/v1
          kind: ResourceSlice
          metadata:
            name: cxl-memory-kind
          spec:
            driver: cxl.example.com
            pool:
              name: kind-cxl-pool
              generation: 1
              resourceSliceCount: 1
            nodeName: ${WORKER_NODE}
            devices:
              - name: cxl-mem-0
                attributes:
                  type:
                    string: "cxl-memory"
                  sizeGB:
                    int: 64
          EOF
          kubectl get resourceslices

      - name: Run E2E test workload
        run: |
          kubectl apply -f deploy/examples/test-workload.yaml
          echo "Waiting for test pod to be scheduled..."
          sleep 10
          kubectl -n cxl-system get resourceclaims
          kubectl -n cxl-system get pods
          # verify claim was processed
          kubectl -n cxl-system get resourceclaim -o jsonpath='{.items[0].metadata.annotations}' | grep -q "cxl.example.com" && echo "ResourceClaim annotation found - allocation successful"

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== Controller Logs ==="
          kubectl -n cxl-system logs deployment/cxl-dra-controller --tail=100 || true
          echo "=== Mock Switch Logs ==="
          kubectl -n cxl-system logs deployment/cxl-mock-switch --tail=100 || true
          echo "=== Node Plugin Logs ==="
          kubectl -n cxl-system logs daemonset/cxl-node-plugin --tail=100 || true
          echo "=== Events ==="
          kubectl -n cxl-system get events --sort-by='.lastTimestamp' || true
