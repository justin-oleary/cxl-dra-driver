name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: justin-oleary

jobs:
  release:
    name: Build and Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push controller
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.controller
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/cxl-dra-controller:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/cxl-dra-controller:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push node-plugin
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.node-plugin
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/cxl-node-plugin:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/cxl-node-plugin:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push mock-switch
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.mock-switch
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/cxl-mock-switch:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/cxl-mock-switch:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
