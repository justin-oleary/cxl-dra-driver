name: Bug Report
description: Report a bug in the CXL DRA Driver
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the fields below.

  - type: input
    id: kubernetes-version
    attributes:
      label: Kubernetes Version
      description: Output of `kubectl version --short`
      placeholder: "v1.35.0"
    validations:
      required: true

  - type: input
    id: driver-version
    attributes:
      label: Driver Version
      description: Image tag or git commit
      placeholder: "v1.0.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue
      placeholder: |
        1. Apply ResourceClaim...
        2. Create Pod...
        3. Observe error...
    validations:
      required: true

  - type: textarea
    id: controller-logs
    attributes:
      label: Controller Logs
      description: Output of `kubectl logs -n cxl-system deploy/cxl-dra-controller`
      render: shell
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information (ResourceClaim YAML, node plugin logs, etc.)
    validations:
      required: false
