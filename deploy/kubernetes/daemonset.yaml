apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cxl-node-plugin
  namespace: cxl-system
  labels:
    app: cxl-node-plugin
spec:
  selector:
    matchLabels:
      app: cxl-node-plugin
  template:
    metadata:
      labels:
        app: cxl-node-plugin
    spec:
      hostNetwork: true
      serviceAccountName: cxl-dra-controller
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: plugin
          image: localhost:30500/cxl-node-plugin:latest
          imagePullPolicy: Always
          args:
            - "--node-name=$(NODE_NAME)"
            - "--v=2"
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: true
          volumeMounts:
            - name: plugins-registry
              mountPath: /var/lib/kubelet/plugins_registry
            - name: plugins
              mountPath: /var/lib/kubelet/plugins
              mountPropagation: Bidirectional
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            exec:
              command:
                - test
                - -S
                - /var/lib/kubelet/plugins/cxl.example.com/plugin.sock
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            exec:
              command:
                - test
                - -S
                - /var/lib/kubelet/plugins/cxl.example.com/plugin.sock
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: plugins-registry
          hostPath:
            path: /var/lib/kubelet/plugins_registry
            type: DirectoryOrCreate
        - name: plugins
          hostPath:
            path: /var/lib/kubelet/plugins
            type: DirectoryOrCreate
