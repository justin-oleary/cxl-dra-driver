{{- if .Values.mockSwitch.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cxl-dra-driver.fullname" . }}-mock-switch
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cxl-dra-driver.labels" . | nindent 4 }}
    app.kubernetes.io/component: mock-switch
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "cxl-dra-driver.mockSwitchSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cxl-dra-driver.mockSwitchSelectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: switch
          image: "{{ .Values.mockSwitch.image.repository }}:{{ .Values.mockSwitch.image.tag }}"
          imagePullPolicy: {{ .Values.mockSwitch.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.mockSwitch.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: cxl-mock-switch
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cxl-dra-driver.labels" . | nindent 4 }}
    app.kubernetes.io/component: mock-switch
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "cxl-dra-driver.mockSwitchSelectorLabels" . | nindent 4 }}
{{- end }}
